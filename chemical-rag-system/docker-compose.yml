version: '3.8'

services:
  chemical-rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chemical-rag-api
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
      - ./app/static/images:/app/app/static/images
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  chemical-rag-data:
    driver: local
